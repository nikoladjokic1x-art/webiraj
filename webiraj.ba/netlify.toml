[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/auth.html"
  to = "/auth.html"
  status = 200

[[redirects]]
  from = "/dashboard.html"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/dashboard-setup.html"
  to = "/dashboard-setup.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

[[redirects]]
  from = "/store/*"
  to = "/store/:splat"
  status = 200

[[redirects]]
  from = "/js/*"
  to = "/js/:splat"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/css/*"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "/superadmin/*"
  to = "/superadmin/:splat"
  status = 200

[[redirects]]
  from = "/netlify/*"
  to = "/netlify/:splat"
  status = 200

# Store slugs — MUST be last
[[redirects]]
  from = "/:slug"
  to = "/.netlify/functions/store?s=:slug"
  status = 200
