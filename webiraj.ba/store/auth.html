<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prijava — webiraj.ba</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js"></script>
</head>
<body>

  <div class="kartica">
    <h1>Dobrodošli </h1>
    <p class="podnaslov">Prijavite se ili kreirajte novi nalog</p>

    <input class="polje" type="email" id="email" placeholder="Email adresa">
    <input class="polje" type="password" id="password" placeholder="Lozinka">

    <button class="dugme-glavno" onclick="login()">Prijavi se</button>
    <button class="dugme-drugo" onclick="signup()">Registruj se</button>

    <p id="poruka"></p>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
