<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narudžba potvrđena</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;600;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body.moderna { --font:'Inter',sans-serif; --font-heading:'Inter',sans-serif; --bg:#fff; --bg2:#f9f9f9; --bg3:#f2f2f2; --text:#111; --text2:#555; --text3:#999; --accent:#111; --accent-hover:#333; --accent-text:#fff; --price:#111; --border:#e8e8e8; --radius-sm:4px; --radius:8px; --radius-lg:12px; }
    body.elegantna { --font:'Playfair Display',serif; --font-heading:'Playfair Display',serif; --bg:#faf8f4; --bg2:#f5ede4; --bg3:#ede0d4; --text:#1a0f0a; --text2:#7a5c4e; --text3:#b08070; --accent:#1a0f0a; --accent-hover:#3d2010; --accent-text:#e8c99a; --price:#9c6b3c; --border:#ddd0c0; --radius-sm:0px; --radius:0px; --radius-lg:0px; }
    body.bold { --font:'Montserrat',sans-serif; --font-heading:'Montserrat',sans-serif; --bg:#0a0a0a; --bg2:#141414; --bg3:#1e1e1e; --text:#fff; --text2:#aaa; --text3:#666; --accent:#ff2d2d; --accent-hover:#cc0000; --accent-text:#fff; --price:#fff; --border:#2a2a2a; --radius-sm:0px; --radius:2px; --radius-lg:2px; }
    body.prirodna { --font:'Lato',sans-serif; --font-heading:'Lato',sans-serif; --bg:#f7f3ec; --bg2:#fffdf8; --bg3:#ede8df; --text:#2d1f14; --text2:#6b5040; --text3:#a08060; --accent:#5a7a4a; --accent-hover:#446038; --accent-text:#fff; --price:#5a7a4a; --border:#d8ccbc; --radius-sm:4px; --radius:12px; --radius-lg:16px; }

    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: var(--bg); border-bottom: 1px solid var(--border); }
    .header-inner { max-width: 800px; margin: 0 auto; padding: 0 32px; height: 70px; display: flex; align-items: center; }
    .store-logo-wrapper { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .store-logo-img { height: 80px; object-fit: contain; }
    .store-logo-text { font-size: 20px; font-weight: 700; color: var(--text); font-family: var(--font-heading); }

    .sadrzaj { max-width: 800px; margin: 0 auto; padding: 64px 32px; }

    .uspjeh-blok { text-align: center; margin-bottom: 56px; }
    .uspjeh-krug {
      width: 88px; height: 88px;
      background: #d1fae5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      margin: 0 auto 24px;
    }
    body.bold .uspjeh-krug { background: #1e1e1e; }
    .uspjeh-title { font-family: var(--font-heading); font-size: 32px; font-weight: 700; margin-bottom: 10px; }
    .uspjeh-sub { font-size: 16px; color: var(--text2); line-height: 1.6; }

    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    @media (max-width: 600px) { .cards-grid { grid-template-columns: 1fr; } .sadrzaj { padding: 40px 16px; } }

    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
    .card-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 16px; }
    .card-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .card-row:last-child { border-bottom: none; }
    .card-row-label { color: var(--text2); }
    .card-row-value { font-weight: 600; color: var(--text); text-align: right; }

    .stavke-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; }
    .stavka-red { display: flex; align-items: center; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .stavka-red:last-child { border-bottom: none; }
    .stavka-slika { width: 52px; height: 52px; object-fit: cover; border-radius: var(--radius-sm); background: var(--bg3); flex-shrink: 0; }
    .stavka-info { flex: 1; }
    .stavka-naziv { font-size: 14px; font-weight: 600; }
    .stavka-varijanta { font-size: 12px; color: var(--text3); }
    .stavka-cijena { font-size: 15px; font-weight: 700; color: var(--price); }
    .ukupno-red { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; padding-top: 16px; margin-top: 8px; border-top: 2px solid var(--border); }

    .cod-card {
      background: var(--accent);
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 32px;
      color: var(--accent-text);
    }
    .cod-icon { font-size: 36px; flex-shrink: 0; }
    .cod-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .cod-text { font-size: 14px; opacity: 0.85; line-height: 1.5; }

    .nazad-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 16px;
      background: var(--accent); color: var(--accent-text);
      border: none; border-radius: var(--radius);
      font-family: var(--font); font-size: 16px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      transition: background 0.2s;
    }
    .nazad-btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="#" class="store-logo-wrapper" id="store-logo-wrapper">
        <img id="store-logo-img" class="store-logo-img" style="display:none;">
        <span class="store-logo-text" id="store-logo-text"></span>
      </a>
    </div>
  </header>

  <div class="sadrzaj">
    <div class="uspjeh-blok">
      <div class="uspjeh-krug">✓</div>
      <h1 class="uspjeh-title">Narudžba primljena!</h1>
      <p class="uspjeh-sub">Hvala vam na kupovini. Prodavnica će vas kontaktirati na broj<br>koji ste naveli kako bi potvrdili dostavu.</p>
    </div>

    <div class="cod-card">
      <span class="cod-icon">💵</span>
      <div>
        <p class="cod-title">Plaćanje pouzećem</p>
        <p class="cod-text">Platite kuriru pri preuzimanju paketa. Ne trebate ništa platiti unaprijed.</p>
      </div>
    </div>

    <div class="cards-grid">
      <div class="card">
        <p class="card-title">Kontakt</p>
        <div id="kontakt-sadrzaj"></div>
      </div>
      <div class="card">
        <p class="card-title">Dostava</p>
        <div id="dostava-sadrzaj"></div>
      </div>
    </div>

    <div class="stavke-card">
      <p class="card-title" style="margin-bottom:16px;">Naručeni proizvodi</p>
      <div id="stavke-sadrzaj"></div>
    </div>

    <a href="#" id="nazad-btn" class="nazad-btn">← Nazad u prodavnicu</a>
  </div>

  <script>
    async function init() {
      const params = new URLSearchParams(window.location.search)
      const slug = params.get('s')
      const id = params.get('id')

      const { data: store } = await db.from('stores').select('*').eq('slug', slug).single()
      if (!store) return

      document.body.classList.add(store.template || 'moderna')
      document.title = `Narudžba potvrđena — ${store.name}`

      const logoImg = document.getElementById('store-logo-img')
      const logoText = document.getElementById('store-logo-text')
      document.getElementById('store-logo-wrapper').href = `index.html?s=${slug}`
      document.getElementById('nazad-btn').href = `index.html?s=${slug}`

      if (store.logo_url) {
        logoImg.src = store.logo_url
        logoImg.style.display = 'block'
        logoText.style.display = 'none'
      } else {
        logoText.innerText = store.name
      }

      const { data: narudžba } = await db
        .from('orders').select('*, order_items(*)').eq('id', id).single()
      if (!narudžba) return

      document.getElementById('kontakt-sadrzaj').innerHTML = `
        <div class="card-row"><span class="card-row-label">Ime</span><span class="card-row-value">${narudžba.customer_name}</span></div>
        <div class="card-row"><span class="card-row-label">Telefon</span><span class="card-row-value">${narudžba.customer_phone}</span></div>
        ${narudžba.customer_email ? `<div class="card-row"><span class="card-row-label">Email</span><span class="card-row-value">${narudžba.customer_email}</span></div>` : ''}
      `

      document.getElementById('dostava-sadrzaj').innerHTML = `
        <div class="card-row"><span class="card-row-label">Adresa</span><span class="card-row-value">${narudžba.customer_address}</span></div>
        <div class="card-row"><span class="card-row-label">Grad</span><span class="card-row-value">${narudžba.customer_city}</span></div>
        ${narudžba.note ? `<div class="card-row"><span class="card-row-label">Napomena</span><span class="card-row-value">${narudžba.note}</span></div>` : ''}
      `

      document.getElementById('stavke-sadrzaj').innerHTML = `
        ${narudžba.order_items.map(s => `
          <div class="stavka-red">
            <div class="stavka-info">
              <p class="stavka-naziv">${s.product_name} ${s.variant_name ? `(${s.variant_name})` : ''} × ${s.quantity}</p>
            </div>
            <span class="stavka-cijena">${(s.unit_price * s.quantity).toFixed(2)} KM</span>
          </div>
        `).join('')}
        ${narudžba.discount_amount > 0 ? `
          <div class="stavka-red">
            <div class="stavka-info"><p class="stavka-naziv" style="color:#38a169;">Popust</p></div>
            <span class="stavka-cijena" style="color:#38a169;">-${narudžba.discount_amount.toFixed(2)} KM</span>
          </div>` : ''
        }
        <div class="stavka-red">
          <div class="stavka-info"><p class="stavka-naziv">Dostava</p></div>
          <span class="stavka-cijena">11.00 KM</span>
        </div>
        <div class="ukupno-red">
          <span>Ukupno</span>
          <span>${narudžba.total_amount.toFixed(2)} KM</span>
        </div>
      `
    }

    init()
  </script>
</body>
</html>
