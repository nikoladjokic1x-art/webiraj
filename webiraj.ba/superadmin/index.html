<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superadmin — webiraj</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #1a6ef5;
      --accent-light: #e8f0fe;
      --bg: #f6f8fa;
      --bg-white: #ffffff;
      --text: #0f0f0f;
      --text2: #5c6370;
      --text3: #9ba3af;
      --border: #e5e7eb;
      --radius: 10px;
      --shadow-md: 0 4px 24px rgba(0,0,0,0.08);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-md);
    }
    .logo { text-align: center; margin-bottom: 8px; }
    .logo img { height: 60px; width: auto; }
    .logo-text { font-size: 22px; font-weight: 800; color: var(--accent); }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--text3);
      margin-bottom: 32px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); background: var(--bg-white); }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: #1557c0; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      background: #fee2e2;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 14px;
      display: none;
    }
    .error.vidljiva { display: block; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <img src="../assets/logo.png" alt="webiraj" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
      <span class="logo-text" style="display:none;">webiraj</span>
    </div>
    <div class="subtitle">Superadmin pristup</div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@email.com">
    </div>
    <div class="field">
      <label>Lozinka</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') prijava()">
    </div>
    <button class="btn" id="btn" onclick="prijava()">Prijavi se</button>
    <div class="error" id="error"></div>
  </div>

  <script>
    async function prijava() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn = document.getElementById('btn')
      const errorEl = document.getElementById('error')

      errorEl.classList.remove('vidljiva')

      if (!email || !password) {
        errorEl.innerText = 'Unesite email i lozinku.'
        errorEl.classList.add('vidljiva')
        return
      }

      btn.disabled = true
      btn.innerText = 'Prijava...'

      const { data, error } = await db.auth.signInWithPassword({ email, password })

      if (error) {
        errorEl.innerText = 'Pogrešan email ili lozinka.'
        errorEl.classList.add('vidljiva')
        btn.disabled = false
        btn.innerText = 'Prijavi se'
        return
      }

      // Check superadmin role — log full result for debugging
      const { data: profil, error: profilError } = await db
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single()

      console.log('Profil result:', profil)
      console.log('Profil error:', profilError)

      if (profilError || !profil || profil.role !== 'superadmin') {
        await db.auth.signOut()
        errorEl.innerText = profilError
          ? 'RLS greška: ' + profilError.message
          : 'Role je: "' + profil?.role + '" — nije superadmin'
        errorEl.classList.add('vidljiva')
        btn.disabled = false
        btn.innerText = 'Prijavi se'
        return
      }

      window.location.href = 'panel.html'
    }
  </script>
</body>
</html>
